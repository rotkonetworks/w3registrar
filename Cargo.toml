[package]
name = "w3registrar"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.89"
async-stream = "0.3.6"
async-trait = "0.1.83"
chrono = { version = "0.4", features = ["serde"] }
dashmap = "6.1.0"
futures = "0.3.31"
futures-util = "0.3.31"
hex = "0.4.3"
# Pulling matrix-sdk in from GitHub, as the latest stable crate causes a conflict with sqlx.
matrix-sdk = { git = "https://github.com/matrix-org/matrix-rust-sdk.git", rev = "19e89bbd6a0df1c4a5636252b02b9e16cc7ab44d" }
pallet-identity = "38.0.0"
people-rococo-runtime = "0.12.0"
rand = "0.8.5"
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
sqlx = { version = "0.8.0", features = ["runtime-tokio", "sqlite"] }
subxt = { version = "0.37.0", features = ["substrate-compat"] }
subxt-signer = { version = "0.37.0", features = ["sr25519"] }
thiserror = "1.0.64"
tokio = { version = "1.40.0", features = ["full"] }
tokio-stream = "0.1.16"
tokio-tungstenite = "0.24.0"
toml = "0.8"
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
uuid = { version = "1.10.0", features = ["v4", "macro-diagnostics"] }
warp = "0.3"


[dev-dependencies]
pretty_assertions = "1.4.1"
